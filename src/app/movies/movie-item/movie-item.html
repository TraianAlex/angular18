<div [appHighlight]="color" defaultColor="violet" class="movie-item mb-2">
  <div>
    <h4>{{ movie().title }}</h4>
    <small class="subtitle">
      <span>Release date: {{ movie().release_date }}</span>
      <span>Budget: $ {{ movie().budget }} million</span>
      <span>Duration: {{ movie().duration }} min</span>
    </small>
  </div>
  <button (click)="toggleDetails()">{{ showDetails() ? 'Hide details' : 'Details' }}</button>
</div>
<hr>
@if (showDetails() && movieDetails()) {
  <div>
    <p *select="let data; from: movieDetails">The data is: {{ data.summary }}</p><hr>
  </div>
}
