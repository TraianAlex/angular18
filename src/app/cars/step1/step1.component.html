<section class="step1">
  <h1>Step 1: Choose your Model and color</h1>

  <div class="controls">
    <label class="control">
      <span>Model:</span>
      <select #model (change)="service.selectModel(model.value)">
        <option value="">Choose...</option>
        @for (model of service.allModels(); track model.code) {
          <option [value]="model.code">{{ model.description }}</option>
        }
      </select>
    </label>

    @if (service.currentCar()) {
      <label class="control">
        <span>Color:</span>
        <select #color [value]="service.currentColor()?.code" (change)="service.selectColor(color.value)">
          @for (color of service.selectableColors(); track color.code) {
            <option [value]="color.code">{{ color.description }}</option>
          }
        </select>
      </label>
    }
  </div>

  <div class="preview">
    @if (service.currentImage()) {
      <img [src]="service.currentImage()" [alt]="service.currentCar()?.description ?? 'Selected car'" />
    } @else {
      <p class="preview-placeholder">Select a model to preview</p>
    }
  </div>
</section>
