<div class="bg-white rounded-lg shadow-md border border-gray-200 p-6">
  <h2 class="text-xl font-semibold text-gray-800 mb-2">Directives</h2>
  <p class="text-sm text-gray-600 mb-6">
    Type a card number to preview the matching logo. Try numbers starting with 4 (Visa), 5 (Mastercard), or 37 (American
    Express).
  </p>

  <label class="block text-sm font-medium text-gray-700 mb-2" for="card-number">Card number</label>
  <input
    id="card-number"
    type="text"
    class="w-full max-w-md rounded-md border border-gray-300 px-3 py-2 text-gray-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200"
    placeholder="e.g. 4111 1111 1111 1111"
    [ngModel]="cardNumber()"
    (ngModelChange)="updateCardNumber($event)"
  />

  <div class="mt-6 flex items-center gap-4">
    <img ccLogo [cardNumber]="cardNumber()" alt="Credit card logo" class="h-12 w-auto rounded border border-gray-200" />
    <span class="text-sm text-gray-500">Detected from: {{ cardNumber() || 'no input yet' }}</span>
  </div>
</div>
