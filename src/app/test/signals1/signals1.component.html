<div>
  <button class="bg-blue-500 text-white p-2 rounded-md mt-2" (click)="incrementCount()">Increment Count</button>
  <p>Double Count: {{ doubleCountValue() }}</p>
  <hr />
  <p>User Logged In: {{ userLoggedIn() }}</p>
</div>
<hr />
<div>Name: {{ name() }}</div>
<div>Age: {{ age() }}</div>
<button class="bg-blue-500 text-white p-2 rounded-md mr-2" (click)="updateName()">Update Name</button>
<button class="bg-blue-500 text-white p-2 rounded-md mr-2" (click)="updateAge()">Update Age</button>
