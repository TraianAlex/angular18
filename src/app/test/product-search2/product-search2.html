<input type="text" [formControl]="search" placeholder="Search products" class="border border-gray-300 rounded-md p-2" />

<select [formControl]="category" class="border border-gray-300 rounded-md p-2">
  <option value="">All Categories</option>
  <option value="smartphones">Smartphones</option>
  <option value="mobile-accessories">Mobile Accessories</option>
</select>

@if (loading) {
  <div>Loading...</div>
}

@if (products$ | async; as products) {
  <ul>
    @for (product of products; track product.id) {
      <li>
        <strong>{{ product.title }}</strong>
        <div>{{ product.price | currency }}</div>
        <div>{{ product.category }}</div>
      </li>
    } @empty {
      <li>No matching products found.</li>
    }
  </ul>
}
